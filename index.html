<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mim ❤️ Rafi</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6fa5,#8b5cf6);
overflow:hidden;
}

.card{

width:90%;
max-width:420px;

padding:35px;

border-radius:30px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

box-shadow:0 0 35px rgba(255,255,255,.3);

text-align:center;

animation:fade 1.3s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

h1{

color:white;

font-size:38px;

margin-bottom:20px;

}

p{

color:white;

font-size:17px;

line-height:30px;

}

button{

margin-top:35px;

padding:15px 35px;

border:none;

border-radius:40px;

font-size:18px;

background:white;

color:#ff2f7d;

font-weight:bold;

cursor:pointer;

transition:.4s;

}

button:hover{

transform:scale(1.08);

}

.heart{

position:absolute;

font-size:22px;

animation:float 8s linear infinite;

opacity:.7;

}

@keyframes float{

0%{

transform:translateY(100vh);

}

100%{

transform:translateY(-120vh);

}

}

</style>

</head>

<body>

<div class="card">

<h1>💖 Hey Mim 💖</h1>

<p>

Before you click anything...

I just want you to know that every little thing about you makes my world brighter.

This isn't just a website...

It's a little place made with love...

Just for You.

❤️

</p>

<button onclick="start()">

Open My Heart ❤️

</button>

</div>

<script>

function start(){

window.location.href="home.html";

}

for(let i=0;i<40;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(5+Math.random()*6)+"s";

h.style.fontSize=(15+Math.random()*20)+"px";

document.body.appendChild(h);

}

</script>

</body>

</html>
