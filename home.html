<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Things That Make You Special ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff5fa2,#8b5cf6);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
width:95%;
max-width:420px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px rgba(255,255,255,.3);
}

h1{
color:white;
margin-bottom:10px;
}

p{
color:white;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.card{
background:white;
border-radius:20px;
padding:18px;
font-size:30px;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.1);
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
background:white;
padding:25px;
border-radius:20px;
display:none;
text-align:center;
box-shadow:0 0 25px #ff2d75;
animation:pop .4s;
}

@keyframes pop{
from{
transform:translate(-50%,-50%) scale(.5);
opacity:0;
}
to{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
}

.popup h2{
color:#ff2d75;
margin-bottom:10px;
}

.popup p{
color:#444;
}

button{
margin-top:20px;
padding:10px 25px;
border:none;
border-radius:25px;
background:#ff2d75;
color:white;
cursor:pointer;
}

.heart{
position:absolute;
font-size:20px;
animation:fly 7s linear infinite;
}

@keyframes fly{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{opacity:1;}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>

</head>

<body>

<div class="container">

<h1>💖 Mim ❤️ Rafi 💖</h1>

<p>Little Things That Make You Special</p>

<div class="grid">

<div class="card" onclick="openMsg('😊 Your Smile','Your smile is my favorite view in the whole world.')">😊</div>

<div class="card" onclick="openMsg('❤️ My Heart','No matter where life takes us, my heart always chooses you.')">❤️</div>

<div class="card" onclick="openMsg('🌸 Beautiful','You make ordinary days feel magical.')">🌸</div>

<div class="card" onclick="openMsg('🌙 Nights','Every late-night conversation with you is special.')">🌙</div>

<div class="card" onclick="openMsg('✨ Memories','Every memory with you is priceless.')">✨</div>

<div class="card" onclick="openMsg('💌 Secret','Thank you for existing, Mim.')">💌</div>

</div>

</div>

<div class="popup" id="popup">
<h2 id="title"></h2>
<p id="text"></p>
<button onclick="closeMsg()">Close ❤️</button>
</div>

<script>

function openMsg(title,text){
document.getElementById("popup").style.display="block";
document.getElementById("title").innerHTML=title;
document.getElementById("text").innerHTML=text;
}

function closeMsg(){
document.getElementById("popup").style.display="none";
}

for(let i=0;i<40;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(5+Math.random()*5)+"s";
h.style.fontSize=(15+Math.random()*20)+"px";
document.body.appendChild(h);
}

</script>

</body>
</html>
