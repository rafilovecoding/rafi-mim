<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Letter ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff5fa2,#7c4dff);
overflow:hidden;
}

.box{
width:90%;
max-width:420px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
text-align:center;
box-shadow:0 0 30px rgba(255,255,255,.4);
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}

h1{
color:white;
margin-bottom:15px;
}

p{
color:white;
line-height:30px;
font-size:17px;
}

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff2d75;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

#surprise{
display:none;
margin-top:25px;
font-size:22px;
color:#fff;
animation:fade 1s;
}

.heart{
position:absolute;
font-size:20px;
animation:fly 8s linear infinite;
}

@keyframes fly{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>

</head>

<body>

<div class="box">

<h1>💌 A Letter For Mim</h1>

<p>
Hey Mim... ❤️<br><br>

If you are reading this, thank you for being part of my life.

Your smile makes ordinary days feel extraordinary.

No matter what happens, I will always pray for your happiness.

Thank you for being you.

— Love, Rafi 💖

</p>

<button onclick="showLove()">
Open Surprise 🎁
</button>

<div id="surprise">
🌹 I Love You More Than Words Can Say ❤️
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function showLove(){
document.getElementById("surprise").style.display="block";
document.getElementById("music").play();
}

for(let i=0;i<40;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(h);

}

</script>

</body>
</html>
